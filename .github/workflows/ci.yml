name: RBSL CI/CD Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './${{ matrix.folder }}/package-lock.json'
      
      - name: Install Dependencies
        run: npm install
        working-directory: ./${{ matrix.folder }}
      
      - name: Run Lint
        run: npm run lint
        working-directory: ./${{ matrix.folder }}
      
      - name: Run Type-check
        run: npm run type-check
        working-directory: ./${{ matrix.folder }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Run NPM Audit
        run: npm audit --audit-level=high
        working-directory: ./${{ matrix.folder }}

  test-and-coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      
      - name: Install Dependencies
        run: npm install
        working-directory: ./backend
      
      - name: Run Unit Tests with Coverage
        run: |
          npm run test:unit -- --coverage --coverageThreshold='{"global":{"lines":80}}'
        working-directory: ./backend

  dhaka-unit-verification:
    name: Dhaka Unit Verification
    runs-on: ubuntu-latest
    needs: [test-and-coverage]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      
      - name: Install Dependencies
        run: npm install
        working-directory: ./backend
      
      - name: Run E2E Verification Script
        run: npx ts-node src/scripts/end-to-end-verification.ts
        working-directory: ./backend
